version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - ineffassign
          - staticcheck

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports

  settings:
    gofumpt:
      simplify: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
