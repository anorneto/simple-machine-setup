run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck      # Check for unchecked errors
    - gosimple      # Simplify code
    - govet         # Standard Go vet
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Advanced static analysis
    - unused        # Find unused code

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment  # Too noisy, rarely actionable

formatters:
  enable:
    - gofmt
    - gofumpt   # Stricter gofmt superset
    - goimports

  settings:
    gofumpt:
      simplify: true
    goimports:
      local-prefixes: github.com/anorneto/zimvor

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - ineffassign
        - staticcheck
  max-issues-per-linter: 0
  max-same-issues: 0
