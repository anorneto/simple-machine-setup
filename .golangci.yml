version: "2"

run:
  timeout: 5m
  tests: true
  go: '1.26'
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck     # check for unchecked errors
    - govet        # standard Go vet checks
    - ineffassign  # detect ineffectual assignments
    - staticcheck  # advanced static analysis (covers gosimple + stylecheck)
    - unused       # find unused code
    #- dupword     # catch duplicated words in comments
    #- errorlint   # catch error handling mistakes (%v vs %w, etc.)
    #- gosec       # security checks (command injection, file perms)
    #- misspell    # catch common typos in comments/strings
    #- unconvert   # catch unnecessary type conversions
    #- wrapcheck   # catch unwrapped errors from external packages

  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment

  exclusions:
    warn-unused: true
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - ineffassign
          - staticcheck

formatters:
  enable:
    - gofmt       # standard Go formatting
    - gofumpt     # stricter gofmt superset
    - goimports   # organize and group imports

  settings:
    gofumpt:
      simplify: true

  exclusions:
    generated: strict

issues:
  uniq-by-line: true
  max-issues-per-linter: 0
  max-same-issues: 0
