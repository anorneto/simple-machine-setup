from_latest_tag = false
ignore_merge_commits = false
ignore_fixup_commits = false
disable_changelog = false
disable_bump_commit = false
generate_mono_repository_global_tag = true
generate_mono_repository_package_tags = true
branch_whitelist = []
pre = "alpha.*"
skip_ci = "[skip ci]"
skip_untracked = false
pre_bump_hooks = []
post_bump_hooks = []
pre_package_bump_hooks = []
post_package_bump_hooks = []

[git_hooks]

[commit_types]
ai = { changelog_title = "AI" }
improv = { changelog_title = "Improvements" }
wip = { omit_from_changelog = true }
doc = { changelog_title = "Documentation" }

[changelog]
path = "CHANGELOG.md"
remote = "github.com"
owner = "Anor Neto"
authors = [{"username" = "Anor Neto", "signature" = "anornetoo@gmail.com"}]

[bump_profiles]
