[meta]
os = "linux"
description = "WSL / Linux workstation"

[[packages]]
id = "fish"
binary = "fish"
install = [
  "sudo apt-add-repository ppa:fish-shell/release-3 -y",
  "sudo apt update",
  "sudo apt install -y fish",
]

[[packages]]
id = "git"
install = ["sudo apt install -y git"]

[[packages]]
id = "unzip"
install = ["sudo apt install -y zip unzip p7zip-full"]

[[packages]]
id = "mise"
binary = "mise"
install = ["curl https://mise.run | sh"]

[[dotfiles]]
id = "fish-configs"
source = "dotfiles/fish"
target = "~/.config/fish"

[[dotfiles]]
id = "mise-config"
source = "dotfiles/mise.toml"
target = "~/.config/mise/config.toml"

[[dotfiles]]
id = "starship-config"
source = "dotfiles/starship.toml"
target = "~/.config/starship.toml"

[[tasks]]
id = "set-fish-default"
description = "Set fish as default shell"
stage = "post"
command = "chsh -s $(which fish)"

[[tasks]]
id = "mise-install-tools"
description = "Install mise tools"
stage = "post"
command = "mise install -y"

[[tasks]]
id = "mise-fish-completions"
description = "Generate mise fish completions"
stage = "post"
command = "mkdir -p ~/.config/fish/completions && mise completion fish > ~/.config/fish/completions/mise.fish"

[[tasks]]
id = "betterleaks-fish-completions"
description = "Generate betterleaks fish completions"
stage = "post"
command = "mkdir -p ~/.config/fish/completions && mise exec -- betterleaks completion fish > ~/.config/fish/completions/betterleaks.fish"

[[tasks]]
id = "uv-fish-completions"
description = "Generate uv fish completions"
stage = "post"
command = "mkdir -p ~/.config/fish/completions && mise exec -- uv generate-shell-completion fish > ~/.config/fish/completions/uv.fish"

[[tasks]]
id = "bun-fish-completions"
description = "Generate bun fish completions"
stage = "post"
command = "mkdir -p ~/.config/fish/completions && mise exec -- bun completions"

[[tasks]]
id = "golangci-lint-fish-completions"
description = "Generate golangci-lint fish completions"
stage = "post"
command = "mkdir -p ~/.config/fish/completions && mise exec -- golangci-lint completion fish > ~/.config/fish/completions/golangci-lint.fish"

[[tasks]]
id = "lefthook-fish-completions"
description = "Generate lefthook fish completions"
stage = "post"
command = "mkdir -p ~/.config/fish/completions && mise exec -- lefthook completion fish > ~/.config/fish/completions/lefthook.fish"

[[tasks]]
id = "cocogitto-fish-completions"
description = "Generate cocogitto fish completions"
stage = "post"
command = "mkdir -p ~/.config/fish/completions && mise exec -- cog generate-completions fish > ~/.config/fish/completions/cog.fish"

[[tasks]]
id = "bat-fish-completions"
description = "Generate bat fish completions"
stage = "post"
command = "mkdir -p ~/.config/fish/completions && mise exec -- bat --completion fish > ~/.config/fish/completions/bat.fish"

